# Automatically updates README.md dynamic zones daily and on livemark release.
#
# Required secret:
#   GH_TOKEN — Personal Access Token with scopes: repo, read:user

name: Update README

on:
  repository_dispatch:
    types: [livemark-release]
  schedule:
    - cron: "0 2 * * *"  # 23:00 UTC-3
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run livemark
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: go run github.com/jeziellopes/livemark@latest --username jeziellopes

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update profile README [skip ci]"
          git push
