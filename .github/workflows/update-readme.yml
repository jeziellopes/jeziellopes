# Automatically updates README.md dynamic zones daily via GitHub API.
#
# Required secret:
#   GH_TOKEN — Personal Access Token with scopes: repo, read:user
#   (Authenticates API calls to avoid rate limiting and enables
#    filtering private repos from OSS contributions. No write
#    access to other repos is needed.)

name: Update README

on:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run update script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: go run scripts/update_readme.go

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update profile README [skip ci]"
          git push
